<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>서비스 점검 중</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg: #0d1321;
      --bg-soft: #182033;
      --panel: rgba(15, 23, 42, 0.84);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --text-muted: #cbd5e1;
      --accent: #f0b55a;
      --accent-soft: rgba(240, 181, 90, 0.16);
      --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 36%),
        radial-gradient(circle at bottom right, rgba(240, 181, 90, 0.16), transparent 32%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    .panel {
      width: min(100%, 560px);
      padding: 44px 36px;
      border-radius: 28px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 0 rgba(240, 181, 90, 0.55);
      animation: pulse 1.8s infinite;
    }

    h1 {
      margin: 22px 0 14px;
      font-size: clamp(2rem, 4vw, 2.6rem);
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    .callout {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .callout strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 0.98rem;
    }

    .note {
      margin-top: 18px;
      font-size: 0.92rem;
      color: rgba(226, 232, 240, 0.8);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(240, 181, 90, 0.55);
      }

      70% {
        box-shadow: 0 0 0 14px rgba(240, 181, 90, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(240, 181, 90, 0);
      }
    }

    @media (max-width: 640px) {
      .panel {
        padding: 36px 24px;
        border-radius: 24px;
      }

      p {
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="badge">Maintenance</div>
    <h1>서비스 점검 중입니다.</h1>
    <p>
      현재 백엔드 점검 및 배포 작업이 진행 중입니다.<br />
      더 안정적인 서비스를 위해 잠시 이용이 제한됩니다.
    </p>

    <section class="callout">
      <strong>작업이 끝나는 대로 바로 정상화됩니다.</strong>
      <p>잠시 후 다시 접속해 주세요. 이용에 불편을 드려 죄송합니다.</p>
    </section>

    <p class="note">문의가 필요한 경우 운영 담당자에게 안내된 채널로 연락해 주세요.</p>
  </main>
</body>
</html>
